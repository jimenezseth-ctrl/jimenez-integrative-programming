<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Lookup</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        background: linear-gradient(135deg, #63a4ff, #83eaf1);
        color: #1a2733;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .wrapper {
        width: min(650px, 94vw);
        background: rgba(255, 255, 255, 0.92);
        border-radius: 18px;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
        padding: 1.4rem;
      }
      h1 {
        margin-top: 0;
        color: #0f4a75;
      }
      p.subtitle {
        margin-top: 0.2rem;
        color: #2a5568;
      }
      .row {
        margin: 0.8rem 0;
      }
      label {
        font-weight: 700;
      }
      input {
        width: 100%;
        border: 1px solid #9bc7da;
        border-radius: 8px;
        padding: 0.65rem;
        box-sizing: border-box;
        font-size: 1rem;
      }
      button {
        margin-top: 0.7rem;
        border: none;
        border-radius: 8px;
        padding: 0.7rem 1.2rem;
        background: #1b96f3;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover {
        background: #0f7bd6;
      }
      #output {
        margin-top: 1rem;
      }
      .card {
        background: #ffffff;
        border-radius: 12px;
        padding: 1rem;
        box-shadow: 0 6px 16px rgba(17, 85, 128, 0.12);
      }
      .error {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fca5a5;
        border-radius: 8px;
        margin-top: 1rem;
        padding: 0.7rem;
      }
      .success {
        background: #dcfce7;
        color: #166534;
        border: 1px solid #a7f3d0;
        border-radius: 8px;
        padding: 0.7rem;
        margin-top: 0.7rem;
      }
      .top-links {
        margin-bottom: 0.8rem;
      }
      .top-links a {
        color: #0f4a75;
        font-weight: 700;
        text-decoration: none;
      }
      .dino-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-top: 1.2rem;
      }
      .dino-attribute {
        background: #f0f7ff;
        padding: 0.8rem;
        border-radius: 8px;
        border-left: 4px solid #1b96f3;
      }
      .dino-attribute strong {
        color: #0f4a75;
        display: block;
        font-size: 0.85rem;
        text-transform: uppercase;
        margin-bottom: 0.3rem;
      }
      .dino-attribute span {
        color: #1a2733;
        font-weight: 600;
        display: block;
      }
      .dino-description {
        background: #f9f9f9;
        padding: 1rem;
        border-radius: 8px;
        margin-top: 1rem;
        border: 1px solid #e0e0e0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="top-links">
        <a href="saved.html">SAVED WEATHER</a>
      </div>
      <h1>Weather Lookup</h1>
      <p class="subtitle">
        Search for a city and get the current weather using Open-Meteo API.
      </p>

      <div class="card">
        <div class="row">
          <label for="city-name">City Name</label>
          <input id="city-name" type="text" placeholder="e.g., Manila" />
        </div>
        <button id="search-btn">Search</button>
        <button id="save-btn" style="display: none">Save</button>
      </div>

      <div id="message"></div>
      <div id="output"></div>
    </div>

    <script>
      const cityInput = document.getElementById("city-name");
      const output = document.getElementById("output");
      const searchBtn = document.getElementById("search-btn");
      const saveBtn = document.getElementById("save-btn");
      const messageDiv = document.getElementById("message");

      let currentWeather = null; // store last fetched data for Save

      const getSavedWeather = () => {
        const raw = localStorage.getItem("savedWeather");
        if (!raw) return [];
        try {
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      };

      const setSavedWeather = (data) => {
        localStorage.setItem("savedWeather", JSON.stringify(data));
      };

      const showMessage = (text, type = "success") => {
        messageDiv.innerHTML = `<div class="${type}">${text}</div>`;
        setTimeout(() => (messageDiv.innerHTML = ""), 2500);
      };

      const renderError = (msg) => {
        output.innerHTML = '<div class="error">' + msg + "</div>";
        saveBtn.style.display = "none";
      };

      const weatherCodeToText = (code) => {
        const mapping = {
          0: "Clear sky",
          1: "Mainly clear",
          2: "Partly cloudy",
          3: "Overcast",
          45: "Fog",
          48: "Depositing rime fog",
          51: "Drizzle: Light",
          53: "Drizzle: Moderate",
          55: "Drizzle: Dense",
          56: "Freezing drizzle: Light",
          57: "Freezing drizzle: Dense",
          61: "Rain: Slight",
          63: "Rain: Moderate",
          65: "Rain: Heavy",
          66: "Freezing rain: Light",
          67: "Freezing rain: Heavy",
          71: "Snow fall: Slight",
          73: "Snow fall: Moderate",
          75: "Snow fall: Heavy",
          77: "Snow grains",
          80: "Rain showers: Slight",
          81: "Rain showers: Moderate",
          82: "Rain showers: Violent",
          85: "Snow showers: Slight",
          86: "Snow showers: Heavy",
          95: "Thunderstorm: Slight or moderate",
          96: "Thunderstorm with slight hail",
          99: "Thunderstorm with heavy hail",
        };
        return mapping[code] || "Unknown weather";
      };

      const renderWeather = (weather) => {
        output.innerHTML = `
          <div class="card">
            <h2 style="text-align: center; color: #0f4a75; font-size: 2.2em; margin-bottom: 0.5rem;">${weather.location}</h2>
            <div class="dino-description">
              ${weather.time}<br />
              ${weather.description}
            </div>
            <div class="dino-grid">
              <div class="dino-attribute">
                <strong>Temperature (°C)</strong>
                <span>${weather.temperature}</span>
              </div>
              <div class="dino-attribute">
                <strong>Wind Speed (km/h)</strong>
                <span>${weather.windspeed}</span>
              </div>
              <div class="dino-attribute">
                <strong>Wind Direction</strong>
                <span>${weather.winddirection}°</span>
              </div>
              <div class="dino-attribute">
                <strong>Weather Code</strong>
                <span>${weather.weathercode}</span>
              </div>
              <div class="dino-attribute">
                <strong>Location</strong>
                <span>${weather.location}</span>
              </div>
              <div class="dino-attribute">
                <strong>Latitude / Longitude</strong>
                <span>${weather.latitude}, ${weather.longitude}</span>
              </div>
            </div>
          </div>
        `;

        currentWeather = weather;
        saveBtn.style.display = "inline-block";
      };

      const fetchWeather = async () => {
        const city = cityInput.value.trim();
        if (!city) {
          renderError("Please enter a city name.");
          return;
        }

        output.innerHTML = "Loading...";
        messageDiv.innerHTML = "";
        saveBtn.style.display = "none";
        currentWeather = null;

        try {
          const geocodeResp = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`,
          );

          if (!geocodeResp.ok) {
            throw new Error("Unable to geocode city. Check network.");
          }

          const geoData = await geocodeResp.json();
          if (!geoData.results || geoData.results.length === 0) {
            throw new Error("City not found. Try another query.");
          }

          const loc = geoData.results[0];
          const weatherResp = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&current_weather=true&timezone=auto`,
          );

          if (!weatherResp.ok) {
            throw new Error("Unable to fetch weather data");
          }

          const weatherData = await weatherResp.json();
          const cw = weatherData.current_weather;
          if (!cw) {
            throw new Error(
              "No current weather data available for this location.",
            );
          }

          const data = {
            location: `${loc.name}${loc.admin1 ? ", " + loc.admin1 : ""}, ${loc.country}`,
            latitude: loc.latitude,
            longitude: loc.longitude,
            temperature: cw.temperature,
            windspeed: cw.windspeed,
            winddirection: cw.winddirection,
            weathercode: cw.weathercode,
            time: cw.time,
            description: weatherCodeToText(cw.weathercode),
          };

          renderWeather(data);
        } catch (error) {
          renderError("Error: " + error.message);
        }
      };

      const saveCurrentWeather = () => {
        if (!currentWeather) {
          showMessage("No weather info to save", "error");
          return;
        }

        const existing = getSavedWeather();
        const isDuplicate = existing.some(
          (item) =>
            item.location === currentWeather.location &&
            item.time === currentWeather.time,
        );
        if (isDuplicate) {
          showMessage("Already saved.", "error");
          return;
        }

        existing.push(currentWeather);
        setSavedWeather(existing);
        showMessage("Saved successfully!");
      };

      searchBtn.addEventListener("click", fetchWeather);
      cityInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") fetchWeather();
      });
      saveBtn.addEventListener("click", saveCurrentWeather);
    </script>
  </body>
</html>
