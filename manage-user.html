<!doctype html>
<html>
  <head>
    <title>Manage Users</title>

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #eef2f7;
        margin: 0;
      }

      .header {
        background: #2c3e50;
        color: white;
        text-align: center;
        padding: 20px;
        font-size: 26px;
        font-weight: bold;
      }

      .container {
        width: 70%;
        margin: 50px auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }

      h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
      }

      th,
      td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid #ddd;
      }

      th {
        background: #3498db;
        color: white;
        font-weight: 600;
      }

      tr:hover {
        background: #f5f7fa;
      }

      button {
        background: #e74c3c;
        color: white;
        border: none;
        padding: 8px 14px;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        background: #c0392b;
        transform: scale(1.05);
      }

      .back-btn {
        display: inline-block;
        text-decoration: none;
        background: #2c3e50;
        color: white;
        padding: 10px 18px;
        border-radius: 6px;
        transition: 0.2s;
      }

      .back-btn:hover {
        background: #1a252f;
      }

      .center {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="header">Admin Panel</div>

    <div class="container">
      <h2>Manage Users</h2>

      <table>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Action</th>
        </tr>

        <tr>
          <td>1</td>
          <td>Seth</td>
          <td>seth@email.com</td>
          <td><button onclick="deleteRow(this)">Delete</button></td>
        </tr>

        <tr>
          <td>2</td>
          <td>Jordan</td>
          <td>jordan@email.com</td>
          <td><button onclick="deleteRow(this)">Delete</button></td>
        </tr>
      </table>

      <div class="center">
        <a href="admin.html" class="back-btn">Back to Dashboard</a>
      </div>
    </div>

    <script>
      let role = localStorage.getItem("userRole");

      if (role !== "admin") {
        alert("Access denied.");
        window.location.href = "login.html";
      }

      function deleteRow(btn) {
        let row = btn.parentNode.parentNode;
        row.remove();
      }
    </script>
  </body>
</html>
