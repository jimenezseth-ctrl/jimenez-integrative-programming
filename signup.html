<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #4b6cb7, #182848);
        color: #1f2937;
      }

      .signup.box {
        background-color: #fff;
        padding: 40px 30px;
        width: 100%;
        max-width: 380px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      .signup.box h1,
      .signup.box h2 {
        text-align: center;
      }

      .signup.box h1 {
        margin-bottom: 8px;
        color: #1e40af;
        font-size: 1.3rem;
      }

      .signup.box h2 {
        margin-bottom: 20px;
        color: #334155;
      }

      .input-group {
        position: relative;
        margin-bottom: 18px;
      }

      .input-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
      }

      .input-group span {
        position: absolute;
        left: 10px;
        top: -10px;
        background: #fff;
        font-size: 0.8rem;
        color: #6b7280;
        padding: 0 4px;
      }

      button[type="submit"] {
        width: 100%;
        padding: 12px;
        background-color: #2563eb;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
      }

      button[type="submit"]:hover {
        background-color: #1d4ed8;
      }

      .signup.box a {
        display: block;
        margin-top: 14px;
        text-align: center;
        color: #2563eb;
        text-decoration: none;
      }

      .signup.box a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="signup box">
      <h1>Welcome to Dinosaur World</h1>
      <h2>Sign Up</h2>
      <form>
        <div class="input-group">
          <input type="text" required="required" />
          <span>Username</span>
        </div>
        <div class="input-group">
          <input type="email" required="required" />
          <span>Email</span>
        </div>
        <div class="input-group">
          <input type="password" required="required" />
          <span>Password</span>
        </div>
        <button type="submit">Sign Up</button>
        <a href="index.html">Back to Home</a>
      </form>
    </div>
  </body>
</html>
