<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Weather</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        background: linear-gradient(135deg, #83eaf1, #63a4ff);
        color: #1a2733;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .wrapper {
        width: min(760px, 94vw);
        background: rgba(255, 255, 255, 0.95);
        border-radius: 18px;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
        padding: 1.4rem;
      }
      h1 {
        margin-top: 0;
        color: #0f4a75;
      }
      .item-card {
        border: 1px solid #c6e0f5;
        border-radius: 10px;
        padding: 1rem;
        margin: 0.7rem 0;
        background: #fff;
      }
      .dino-name {
        font-size: 1.3em;
        color: #0f4a75;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      .dino-info {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.8rem;
        margin: 0.8rem 0;
      }
      .info-item {
        background: #f0f7ff;
        padding: 0.6rem;
        border-radius: 6px;
        border-left: 3px solid #1b96f3;
      }
      .info-label {
        font-weight: 700;
        color: #0f4a75;
        font-size: 0.8rem;
        text-transform: uppercase;
      }
      .info-value {
        color: #1a2733;
        margin-top: 0.2rem;
      }
      .dino-description {
        background: #f9f9f9;
        padding: 0.8rem;
        border-radius: 6px;
        margin: 0.8rem 0;
        line-height: 1.5;
      }
      .row {
        margin: 0.3rem 0;
      }
      button {
        margin-top: 0.6rem;
        border: none;
        border-radius: 8px;
        padding: 0.45rem 0.9rem;
        background: #e66868;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover {
        background: #c03f3f;
      }
      .empty {
        color: #345b73;
        padding: 1rem;
        background: #eaf6ff;
        border-radius: 8px;
      }
      .top-links {
        margin-bottom: 0.8rem;
      }
      .top-links a {
        color: #0f4a75;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="top-links">
        <a href="API.html">WEATHER SEARCH</a>
      </div>
      <h1>Saved Weather Records</h1>
      <div id="saved-list"></div>
    </div>

    <script>
      const savedList = document.getElementById("saved-list");

      const getSavedWeather = () => {
        const raw = localStorage.getItem("savedWeather");
        if (!raw) return [];
        try {
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      };

      const setSavedWeather = (items) => {
        localStorage.setItem("savedWeather", JSON.stringify(items));
      };

      const renderSaved = () => {
        const items = getSavedWeather();
        if (items.length === 0) {
          savedList.innerHTML =
            '<div class="empty">No saved weather records yet. Search and save weather from the Weather Search page.</div>';
          return;
        }

        const html = items
          .map((weather, index) => {
            return `
          <div class="item-card">
            <div class="dino-name">${weather.location} (${weather.time})</div>
            <div class="dino-description">
              ${weather.description}
            </div>
            <div class="dino-info">
              <div class="info-item">
                <div class="info-label">Temp (°C)</div>
                <div class="info-value">${weather.temperature}</div>
              </div>
              <div class="info-item">
                <div class="info-label">Wind Speed</div>
                <div class="info-value">${weather.windspeed}</div>
              </div>
              <div class="info-item">
                <div class="info-label">Wind Direction</div>
                <div class="info-value">${weather.winddirection}°</div>
              </div>
              <div class="info-item">
                <div class="info-label">Coordinates</div>
                <div class="info-value">${weather.latitude}, ${weather.longitude}</div>
              </div>
            </div>
            <button onclick="removeSaved(${index})">Remove</button>
          </div>
        `;
          })
          .join("");
        savedList.innerHTML = html;
      };

      window.removeSaved = (index) => {
        const items = getSavedWeather();
        if (index < 0 || index >= items.length) return;
        items.splice(index, 1);
        setSavedWeather(items);
        renderSaved();
      };

      renderSaved();
    </script>
  </body>
</html>
